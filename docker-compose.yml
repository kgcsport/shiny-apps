services:
  shiny:
    image: ghcr.io/kgcsport/shiny-apps:latest
    build: .
    restart: always
    ports:
      - "80:3838"
    volumes:
      # Optional: only needed if you want Google Drive backups/Sheets sync
      # via a credentials *file*. Simpler alternative: set
      # GOOGLE_SERVICE_ACCOUNT_JSON (the raw JSON content) in .env instead —
      # no file or mount required. Uncomment below if you specifically want
      # the file-based path and have google_application_credentials.json
      # in this directory:
      # - ./google_application_credentials.json:/run/secrets/gcp.json:ro
      - ./appdata:/srv/shiny-server/appdata
      - ./shiny-logs:/var/log/shiny-server
    env_file: .env
    environment:
      # Worker/session tuning presets. Pick one profile by setting these three
      # variables in .env or uncommenting one block below, then restart.
      #
      # Low memory:
      # SHINY_SIMPLE_SCHEDULER: "40"
      # SHINY_APP_IDLE_TIMEOUT: "60"
      # SHINY_APP_SESSION_TIMEOUT: "600"
      #
      # Balanced:
      SHINY_SIMPLE_SCHEDULER: ${SHINY_SIMPLE_SCHEDULER:-30}
      SHINY_APP_IDLE_TIMEOUT: ${SHINY_APP_IDLE_TIMEOUT:-60}
      SHINY_APP_SESSION_TIMEOUT: ${SHINY_APP_SESSION_TIMEOUT:-900}
      #
      # Responsiveness:
      # SHINY_SIMPLE_SCHEDULER: "15"
      # SHINY_APP_IDLE_TIMEOUT: "30"
      # SHINY_APP_SESSION_TIMEOUT: "1200"
