name: Build & push shiny-apps to GHCR

on:
  push:
    branches: [ main ]
    paths:
      - "apps/**"
      - "shiny-server.conf"
      - "Dockerfile.base"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: |
            ghcr.io/kgcsport/shiny-apps:latest
            ghcr.io/kgcsport/shiny-apps:${{ github.sha }}