run_as shiny;

server {
  listen 3838;

  location / {
    site_dir /srv/shiny-server;
    log_dir /var/log/shiny-server;

    directory_index on;

    # Spawn a new R worker after 15 sessions on one process.
    # With WAL-mode SQLite, multiple workers safely share the same DB file,
    # so students on different workers see the same game state.
    # Each worker gets its own event loop, so one student's write can't freeze another's.
    simple_scheduler 15;

    app_idle_timeout 30;        # give 30s for final backup after last disconnect
    # app_session_timeout 300;    # 10 minutes idle sessions disconnected (best-effort)

  }
}




